<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="navbar">
    <div class="nav-content">
        Weather App
    </div>
</header>

<div class="app-container">

    <section class="search-section">
        <input type="text" id="cityInput" placeholder="Search city..." />
        <button id="searchBtn">Search</button>
    </section>

    <div id="historyContainer"></div>

    <section class="hero">
        <div id="weatherIcon"></div>
        <h2 id="cityName"></h2>
        <h1 id="temperature"></h1>
        <p id="description"></p>
         <button id="unitToggle">Switch to °F</button>
    </section>

    <section class="stats">
            <div class="stat-card">
                <h3>Humidity</h3>
                <p id="humidity">--%</p>
            </div>

            <div class="stat-card">
                <h3>Wind Speed</h3>
                <p id="windSpeed">-- km/h</p>
            </div>

            <div class="stat-card">
                <h3>UV Index</h3>
                <p id="uvIndex">N/A</p>
            </div>
        </section>

    <div class="forecast-wrapper">
        <h2 class="forecast-title">5-DAY FORECAST</h2>
        <section class="forecast-section">
            <div id="forecastContainer"></div>
        </section>
    </div>

    <section>
        <p id="loadingMessage"></p>
        <p id="errorMessage"></p>
    </section>

</div>

<script src="script.js"></script>
</body>
</html>
